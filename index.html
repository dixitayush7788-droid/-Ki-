<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhai Ki Baithak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .serif-font { font-family: 'Playfair Display', serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-item { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex justify-center items-center p-2 sm:p-4">

  <!-- Mobile Frame Wrapper -->
  <div class="relative w-full max-w-md h-[92vh] max-h-[850px] bg-[#F8F9FA] rounded-[40px] shadow-2xl overflow-hidden border-[6px] border-slate-900 flex flex-col">
    
    <!-- LEFT RED SIDEBAR -->
    <div id="red-sidebar" class="absolute top-0 left-0 w-[32%] h-full bg-[#E63946] transition-all duration-500"></div>

    <!-- CONTENT LAYER -->
    <div class="relative z-10 w-full h-full flex flex-col pt-10 px-5 overflow-y-auto hide-scrollbar pb-6">
      
      <!-- HEADER (Menu & Cart) -->
      <div class="flex justify-between items-center mb-4">
        <button id="back-btn" onclick="showCategories()" class="text-white text-2xl font-bold p-1 hidden focus:outline-none">←</button>
        <button id="menu-btn" class="text-white text-2xl font-bold p-1 focus:outline-none">☰</button>
        
        <button class="text-slate-800 text-2xl p-1 focus:outline-none relative active:scale-90 transition-transform">
          🛒
          <span id="cart-count" class="absolute -top-1 -right-1 bg-[#E63946] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </button>
      </div>

      <!-- BRAND NAME SECTION -->
      <div id="brand-header" class="ml-[28%] pl-4 mb-6 transition-all duration-300">
        <p class="text-xs uppercase tracking-widest text-[#E63946] font-extrabold mb-0.5">Welcome To</p>
        <h1 class="text-2xl font-black text-slate-800 serif-font italic leading-none">
          Bhai Ki Baithak
        </h1>
      </div>

      <!-- SCREEN 1: CATEGORIES -->
      <div id="categories-screen" class="flex flex-col space-y-6">
        
        <!-- CARD 1: MOMO -->
        <div onclick="showMenu('Momo')" class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1625220194771-7ebedd0b4a1b?q=80&w=200&auto=format&fit=crop" alt="Momo" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Momo</h2>
            <p class="text-[#E63946] text-[10px] font-extrabold uppercase tracking-tighter italic">⭐ Full Plate (12 Pieces)</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 2: ROLLS -->
        <div onclick="showMenu('Rolls')" class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1626132647523-66f5bf380027?q=80&w=200&auto=format&fit=crop" alt="Rolls" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Rolls</h2>
            <p class="text-gray-400 text-xs font-semibold">🌯 Rolls Corner</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 3: FRENCH FRIES -->
        <div onclick="showMenu('French Fries')" class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?q=80&w=200&auto=format&fit=crop" alt="French Fries" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">French fries</h2>
            <p class="text-gray-400 text-xs font-semibold">🍟 Fries Station</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 4: BURGER -->
        <div onclick="showMenu('Burger')" class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=200&auto=format&fit=crop" alt="Burger" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Burger</h2>
            <p class="text-gray-400 text-xs font-semibold">🍔 Burger Hub</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

      </div>

      <!-- SCREEN 2: DYNAMIC ITEMS -->
      <div id="items-screen" class="hidden flex flex-col space-y-4">
        <div class="mb-2">
            <h1 id="selected-category-title" class="text-3xl font-black text-slate-800 serif-font">Menu</h1>
            <p id="category-subtitle" class="text-[#E63946] font-bold text-[11px] tracking-wider uppercase bg-red-50 inline-block px-2 py-1 rounded-lg"></p>
        </div>
        
        <div id="dynamic-items-container" class="flex flex-col space-y-4"></div>
      </div>

    </div>
  </div>

  <script>
    let cartCount = 0;

    const menuData = {
      'Momo': [
        { name: '🌿 Veg Steam Momos', price: 49, desc: 'Soft, garam aur juicy veg filling wale classic momos. (12 Pcs)', img: 'https://images.unsplash.com/photo-1625220194771-7ebedd0b4a1b?q=80&w=150&auto=format&fit=crop' },
        { name: '🔥 Veg Fried Momos', price: 59, desc: 'Outside crispy, inside full tasty stuffing. (12 Pcs)', img: 'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?q=80&w=150&auto=format&fit=crop' },
        { name: '🧀 Paneer Steam Momos', price: 69, desc: 'Soft paneer filling with bhai special masala touch. (12 Pcs)', img: 'https://images.unsplash.com/photo-1625220194771-7ebedd0b4a1b?q=80&w=150&auto=format&fit=crop' },
        { name: '🌶️ Paneer Fried Momos', price: 79, desc: 'Crispy paneer momos with spicy street-style flavor. (12 Pcs)', img: 'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?q=80&w=150&auto=format&fit=crop' },
        { name: '💥 Bhai Special Kurkure Momos', price: 99, desc: 'Extra crunchy, extra chatpata — ek baar khaoge fir repeat karoge. (12 Pcs)', img: 'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?q=80&w=150&auto=format&fit=crop' }
      ],
      'Rolls': [
        { name: '🥬 Crispy Spring Roll', price: 29, desc: 'Light crispy roll with tasty veggie filling', img: 'https://images.unsplash.com/photo-1626132647523-66f5bf380027?q=80&w=150&auto=format&fit=crop' },
        { name: '🌿 Pure Veg Roll', price: 39, desc: 'Fresh veggies, spicy sauces & full street-style taste', img: 'https://images.unsplash.com/photo-1626132647523-66f5bf380027?q=80&w=150&auto=format&fit=crop' },
        { name: '🧀 Cheese Loaded Roll', price: 49, desc: 'Melty cheese with creamy spicy flavor in every bite', img: 'https://images.unsplash.com/photo-1607532941433-304659e8198a?q=80&w=150&auto=format&fit=crop' }
      ],
      'French Fries': [
        { name: '🍟 Classic French Fries', price: 39, desc: 'Golden crispy fries with perfect salted taste', img: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?q=80&w=150&auto=format&fit=crop' },
        { name: '🌶️ Peri Peri Fries', price: 49, desc: 'Loaded with spicy peri peri seasoning', img: 'https://images.unsplash.com/photo-1576107232684-1279f390859f?q=80&w=150&auto=format&fit=crop' },
        { name: '🧈 Tandoori Mayo Fries', price: 59, desc: 'Creamy tandoori mayo with smoky desi flavor', img: 'https://images.unsplash.com/photo-1585109649139-366815a0d713?q=80&w=150&auto=format&fit=crop' }
      ],
      'Burger': [
        { name: '🌿 Veg Burger', price: 39, desc: 'Fresh veggie patty with crunchy veggies & tasty sauces', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=150&auto=format&fit=crop' },
        { name: '🧀 Paneer Burger', price: 49, desc: 'Soft paneer patty with spicy creamy flavor', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=150&auto=format&fit=crop' },
        { name: '🧈 Cheese Burger', price: 59, desc: 'Loaded with melting cheese & signature sauces', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=150&auto=format&fit=crop' }
      ]
    };

    function showMenu(categoryName) {
      document.getElementById('categories-screen').classList.add('hidden');
      document.getElementById('brand-header').classList.add('hidden');
      document.getElementById('items-screen').classList.remove('hidden');
      document.getElementById('menu-btn').classList.add('hidden');
      document.getElementById('back-btn').classList.remove('hidden');
      
      // Dynamic Title and Subtitle adaptation
      if (categoryName === 'Momo') {
        document.getElementById('selected-category-title').innerText = "Momos Menu";
        document.getElementById('category-subtitle').innerText = "🔥 Har plate me 12 pieces honge";
      } else if (categoryName === 'Rolls') {
        document.getElementById('selected-category-title').innerText = "Rolls Corner";
        document.getElementById('category-subtitle').innerText = "🌯 Freshly Wrapped for Bhai";
      } else if (categoryName === 'French Fries') {
        document.getElementById('selected-category-title').innerText = "Fries Station";
        document.getElementById('category-subtitle').innerText = "🍟 Crispy, Hot & Fresh";
      } else if (categoryName === 'Burger') {
        document.getElementById('selected-category-title').innerText = "Burger Hub";
        document.getElementById('category-subtitle').innerText = "🍔 Juicy & Heavy Fillings";
      } else {
        document.getElementById('selected-category-title').innerText = categoryName + " Menu";
        document.getElementById('category-subtitle').innerText = "Bhai Ki Choice";
      }
      
      document.getElementById('red-sidebar').style.width = '12%';

      const container = document.getElementById('dynamic-items-container');
      container.innerHTML = ''; 

      menuData[categoryName].forEach((item, index) => {
        container.innerHTML += `
          <div class="bg-white rounded-[2rem] p-3 shadow-[0_4px_15px_rgba(0,0,0,0.04)] flex items-center space-x-4 border border-slate-50 animate-item" style="animation-delay: ${index * 0.1}s">
            <img src="${item.img}" class="w-20 h-20 rounded-3xl object-cover shadow-sm">
            <div class="flex-1">
              <h3 class="font-extrabold text-slate-800 text-sm leading-tight">${item.name}</h3>
              <p class="text-[9px] text-gray-500 mt-1 font-medium leading-relaxed">${item.desc}</p>
              <p class="text-sm text-[#E63946] font-black mt-1.5">₹${item.price}</p>
            </div>
            <button onclick="updateCart(1)" class="bg-[#E63946] text-white w-10 h-10 rounded-full font-black shadow-lg active:scale-90 transition-all text-xl hover:bg-red-600">+</button>
          </div>
        `;
      });
    }

    function showCategories() {
      document.getElementById('categories-screen').classList.remove('hidden');
      document.getElementById('brand-header').classList.remove('hidden');
      document.getElementById('items-screen').classList.add('hidden');
      document.getElementById('menu-btn').classList.remove('hidden');
      document.getElementById('back-btn').classList.add('hidden');
      document.getElementById('red-sidebar').style.width = '32%';
    }

    function updateCart(val) {
      cartCount += val;
      document.getElementById('cart-count').innerText = cartCount;
    }
  </script>
</body>
</html>
