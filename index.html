<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhai Ki Baithak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .serif-font { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex justify-center items-center p-2 sm:p-4">

  <!-- Mobile Frame Wrapper -->
  <div class="relative w-full max-w-md h-[92vh] max-h-[850px] bg-[#F8F9FA] rounded-[40px] shadow-2xl overflow-hidden border-[6px] border-slate-900 flex flex-col">
    
    <!-- LEFT RED SIDEBAR -->
    <div id="red-sidebar" class="absolute top-0 left-0 w-[32%] h-full bg-[#E63946] transition-all duration-300"></div>

    <!-- CONTENT LAYER -->
    <div class="relative z-10 w-full h-full flex flex-col pt-10 px-5 overflow-y-auto pb-6">
      
      <!-- HEADER (Menu & Cart) -->
      <div class="flex justify-between items-center mb-4">
        <!-- Dynamic Back / Menu Button -->
        <button id="back-btn" onclick="showCategories()" class="text-white text-2xl font-bold p-1 hidden focus:outline-none">←</button>
        <button id="menu-btn" class="text-white text-2xl font-bold p-1 focus:outline-none">☰</button>
        
        <!-- Cart Icon -->
        <button class="text-slate-800 text-2xl p-1 focus:outline-none relative active:scale-90 transition-transform">
          🛒
          <span id="cart-count" class="absolute -top-1 -right-1 bg-[#E63946] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </button>
      </div>

      <!-- BRAND NAME SECTION (Classy & Aligned Just Next to Red Sidebar) -->
      <div id="brand-header" class="ml-[28%] pl-4 mb-6 transition-all duration-300">
        <p class="text-xs uppercase tracking-widest text-[#E63946] font-extrabold mb-0.5">Welcome To</p>
        <h1 class="text-2xl font-black text-slate-800 serif-font italic leading-none">
          Bhai Ki Baithak
        </h1>
      </div>

      <!-- SCREEN 1: MAIN CATEGORIES -->
      <div id="categories-screen" class="flex flex-col space-y-6">
        
        <!-- CARD 1: PIZZA -->
        <div onclick="showMenu('Pizza')" class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=200&auto=format&fit=crop" alt="Pizza" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Pizza</h2>
            <p class="text-gray-400 text-xs font-semibold">25 items</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 2: SALADS -->
        <div class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=200&auto=format&fit=crop" alt="Salads" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Salads</h2>
            <p class="text-gray-400 text-xs font-semibold">30 items</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 3: DESSERTS -->
        <div class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=200&auto=format&fit=crop" alt="Desserts" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Desserts</h2>
            <p class="text-gray-400 text-xs font-semibold">30 items</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 4: PASTA -->
        <div class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?q=80&w=200&auto=format&fit=crop" alt="Pasta" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Pasta</h2>
            <p class="text-gray-400 text-xs font-semibold">44 items</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

        <!-- CARD 5: BEVERAGES -->
        <div class="relative flex items-center bg-white rounded-3xl p-3.5 shadow-[0_8px_20px_rgba(0,0,0,0.06)] pl-16 cursor-pointer transform active:scale-95 transition-all duration-150">
          <div class="absolute -left-5 w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-md bg-white">
            <img src="https://images.unsplash.com/photo-1541658016709-82535e94bc69?q=80&w=200&auto=format&fit=crop" alt="Beverages" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 ml-4">
            <h2 class="text-xl font-black text-slate-800 tracking-wide serif-font">Beverages</h2>
            <p class="text-gray-400 text-xs font-semibold">30 items</p>
          </div>
          <div class="w-8 h-8 rounded-full border border-gray-100 flex items-center justify-center shadow-sm bg-white text-[#E63946] font-bold text-xs">❯</div>
        </div>

      </div>

      <!-- SCREEN 2: DYNAMIC ITEMS LIST (Hidden initially) -->
      <div id="items-screen" class="hidden flex flex-col space-y-4">
        <h1 id="selected-category-title" class="text-2xl font-black text-slate-800 serif-font mb-2">Items</h1>
        
        <!-- Item 1 -->
        <div class="bg-white rounded-3xl p-3 shadow-[0_4px_15px_rgba(0,0,0,0.04)] flex items-center space-x-4 border border-slate-50">
          <img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?q=80&w=150&auto=format&fit=crop" class="w-16 h-16 rounded-2xl object-cover">
          <div class="flex-1">
            <h3 class="font-bold text-slate-800 text-sm">Bhai Special Margherita</h3>
            <p class="text-xs text-[#E63946] font-extrabold mt-0.5">₹199</p>
          </div>
          <button onclick="updateCart(1)" class="bg-[#E63946] text-white font-bold text-xs px-3 py-1.5 rounded-full active:scale-90 transition-transform">+</button>
        </div>

        <!-- Item 2 -->
        <div class="bg-white rounded-3xl p-3 shadow-[0_4px_15px_rgba(0,0,0,0.04)] flex items-center space-x-4 border border-slate-50">
          <img src="https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?q=80&w=150&auto=format&fit=crop" class="w-16 h-16 rounded-2xl object-cover">
          <div class="flex-1">
            <h3 class="font-bold text-slate-800 text-sm">Baithak Double Cheese</h3>
            <p class="text-xs text-[#E63946] font-extrabold mt-0.5">₹299</p>
          </div>
          <button onclick="updateCart(1)" class="bg-[#E63946] text-white font-bold text-xs px-3 py-1.5 rounded-full active:scale-90 transition-transform">+</button>
        </div>
      </div>

    </div>
  </div>

  <!-- INTERACTIVE JAVASCRIPT LOGIC -->
  <script>
    let cartCount = 0;

    function showMenu(categoryName) {
      document.getElementById('categories-screen').classList.add('hidden');
      document.getElementById('brand-header').classList.add('hidden'); // Hide main brand header on detail
      document.getElementById('items-screen').classList.remove('hidden');
      document.getElementById('menu-btn').classList.add('hidden');
      document.getElementById('back-btn').classList.remove('hidden');
      document.getElementById('selected-category-title').innerText = "Special " + categoryName;
      document.getElementById('red-sidebar').style.width = '12%';
    }

    function showCategories() {
      document.getElementById('categories-screen').classList.remove('hidden');
      document.getElementById('brand-header').classList.remove('hidden'); // Bring brand header back
      document.getElementById('items-screen').classList.add('hidden');
      document.getElementById('menu-btn').classList.remove('hidden');
      document.getElementById('back-btn').classList.add('hidden');
      document.getElementById('red-sidebar').style.width = '32%';
    }

    function updateCart(val) {
      cartCount += val;
      document.getElementById('cart-count').innerText = cartCount;
    }
  </script>
</body>
</html>
